name: Skills Hub Guard (Go Native)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: hb/go.sum

      - name: Build HB-CLI
        run: make build

      - name: Run Integrity Audit
        run: make audit

      - name: Run Consistency Check (Links & Versions)
        run: make check

      - name: Update Knowledge Map
        run: make map

      - name: Build All Platforms (Release Dry Run)
        run: make release

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: hb-binaries
          path: bin/
