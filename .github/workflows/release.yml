name: Release HB-CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: hb/go.sum

      - name: Build All Platforms
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/hb-darwin-arm64
            bin/hb-darwin-amd64
            bin/hb-linux-amd64
            bin/hb-windows-amd64.exe
          body_path: CHANGELOG-HUB.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
