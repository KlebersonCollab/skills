name: Governance Audit (Reusable)

on:
  workflow_call:
    inputs:
      hb-version:
        description: 'Versão do HB-CLI a ser utilizada'
        required: false
        type: string
        default: 'latest'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup HB-CLI
        uses: KlebersonCollab/skills/.github/actions/hb-setup@main
        with:
          version: ${{ inputs.hb-version }}

      - name: Run Governance Audit
        run: hb harness audit --deep

      - name: Check SDD Compliance
        run: hb sdd audit
