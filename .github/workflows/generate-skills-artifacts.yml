name: Generate Skills Artifacts

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Permissions
        run: chmod +x scripts/*.sh

      - name: Generate Artifacts
        run: ./scripts/generate-skills-dist.sh

      - name: Verify Artifacts
        run: ./scripts/verify-dist.sh

      - name: Upload Artifacts (Internal)
        uses: actions/upload-artifact@v4
        with:
          name: all-skills-artifacts
          path: artifacts/*.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/claude-skills.zip
            artifacts/gemini-skills.zip
            artifacts/agent-skills.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
