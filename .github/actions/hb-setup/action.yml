name: 'HB-CLI Setup'
description: 'Installs the HB-CLI governance tool and sets up the Skills Hub environment'
inputs:
  version:
    description: 'Version of hb to install'
    required: false
    default: 'latest'
  bootstrap:
    description: 'Whether to run hb sdd bootstrap'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Detect OS and Arch
      id: info
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then ARCH="amd64"; fi
        if [ "$ARCH" = "aarch64" ]; then ARCH="arm64"; fi
        echo "os=$OS" >> $GITHUB_OUTPUT
        echo "arch=$ARCH" >> $GITHUB_OUTPUT

    - name: Download HB-CLI
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/KlebersonCollab/skills/releases/latest/download/hb-${{ steps.info.outputs.os }}-${{ steps.info.outputs.arch }}"
        else
          URL="https://github.com/KlebersonCollab/skills/releases/download/$VERSION/hb-${{ steps.info.outputs.os }}-${{ steps.info.outputs.arch }}"
        fi
        
        echo "Downloading from $URL"
        mkdir -p $HOME/.hb/bin
        curl -L "$URL" -o $HOME/.hb/bin/hb
        chmod +x $HOME/.hb/bin/hb
        echo "$HOME/.hb/bin" >> $GITHUB_PATH

    - name: Run Bootstrap
      if: ${{ inputs.bootstrap == 'true' }}
      shell: bash
      run: hb sdd bootstrap
