project_name:
  type: str
  help: FastAPI project name
  default: "my-fastapi-app"

module_name:
  type: str
  help: Python module name
  default: "{{ project_name|lower|replace(' ', '_') }}"

description:
  type: str
  help: Project description
  default: "A FastAPI application"

author:
  type: str
  help: Author name
  default: "Your Name"

database:
  type: str
  help: Database choice
  choices:
    - postgresql
    - sqlite
  default: sqlite

include_auth:
  type: bool
  help: Include authentication
  default: false

include_tests:
  type: bool
  help: Include tests
  default: true

include_docker:
  type: bool
  help: Include Docker configuration
  default: true

license:
  type: str
  help: Project license
  default: "MIT"
  choices:
    - MIT
    - Apache-2.0
    - GPL-3.0