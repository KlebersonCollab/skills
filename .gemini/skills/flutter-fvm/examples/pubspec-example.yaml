name: meu_app_fvm
description: "Um novo projeto Flutter profissional gerenciado com FVM."
publish_to: 'none' # Impede a publicação acidental no pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navegação e Injeção de Dependência
  go_router: ^13.2.0
  flutter_riverpod: ^2.5.1
  
  # Utilitários e UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting e Qualidade
  flutter_lints: ^3.0.1
  
  # Mocking e Testes Avançados
  mocktail: ^1.0.3
  
  # Geração de Código
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  # Exemplo de declaração de assets
  # assets:
  #   - assets/images/
  #   - assets/icons/
